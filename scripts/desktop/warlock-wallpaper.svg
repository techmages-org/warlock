<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <title>Warlock Command Center — Wallpaper</title>
  <defs>
    <!-- Radial gradient background: navy center → near-black edges -->
    <radialGradient id="bg" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#0f1630"/>
      <stop offset="55%" stop-color="#0a0f1e"/>
      <stop offset="100%" stop-color="#02040c"/>
    </radialGradient>
    <!-- Subtle hexagonal mesh overlay -->
    <pattern id="hexgrid" x="0" y="0" width="60" height="52" patternUnits="userSpaceOnUse">
      <polygon points="30,2 57,15.5 57,36.5 30,50 3,36.5 3,15.5"
               fill="none" stroke="#ff7a1a" stroke-width="0.4" opacity="0.07"/>
    </pattern>
    <!-- Subtle vertical scanlines (CRT vibe) -->
    <pattern id="scan" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="4" y2="0" stroke="#000" stroke-width="0.5" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Layer 1: base gradient -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  <!-- Layer 2: hex mesh -->
  <rect width="1280" height="720" fill="url(#hexgrid)"/>
  <!-- Layer 3: scanlines -->
  <rect width="1280" height="720" fill="url(#scan)" opacity="0.5"/>

  <!-- RF wave arcs emanating from bottom-left -->
  <g stroke="#ff7a1a" fill="none" opacity="0.10">
    <circle cx="-50" cy="770" r="350"  stroke-width="1"/>
    <circle cx="-50" cy="770" r="500"  stroke-width="1"/>
    <circle cx="-50" cy="770" r="650"  stroke-width="1"/>
    <circle cx="-50" cy="770" r="800"  stroke-width="1"/>
    <circle cx="-50" cy="770" r="950"  stroke-width="1"/>
  </g>
  <!-- RF wave arcs from top-right -->
  <g stroke="#3a8cff" fill="none" opacity="0.07">
    <circle cx="1330" cy="-50" r="300" stroke-width="1"/>
    <circle cx="1330" cy="-50" r="450" stroke-width="1"/>
    <circle cx="1330" cy="-50" r="600" stroke-width="1"/>
    <circle cx="1330" cy="-50" r="750" stroke-width="1"/>
  </g>

  <!-- Large faded hex-W badge, upper-right offset -->
  <g transform="translate(900 90) scale(2.4)" opacity="0.13">
    <polygon points="64,6 115,34 115,94 64,122 13,94 13,34"
             fill="none" stroke="#ff7a1a" stroke-width="2"/>
    <polygon points="64,18 103,40 103,88 64,110 25,88 25,40"
             fill="none" stroke="#ff7a1a" stroke-width="0.8" opacity="0.6"/>
    <path d="M 34 48 L 46 92 L 56 66 L 64 82 L 72 66 L 82 92 L 94 48"
          fill="none" stroke="#ff7a1a" stroke-width="6"
          stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="100" cy="28" r="2.8" fill="#ff7a1a"/>
  </g>

  <!-- Primary wordmark -->
  <text x="640" y="380" text-anchor="middle"
        font-family="Courier New, monospace" font-size="86" font-weight="900"
        fill="#ff7a1a" letter-spacing="14" opacity="0.92">WARLOCK</text>
  <text x="640" y="420" text-anchor="middle"
        font-family="Courier New, monospace" font-size="14" font-weight="400"
        fill="#9aa4c0" letter-spacing="10" opacity="0.55">C O M M A N D   C E N T E R</text>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="2" fill="#ff7a1a" opacity="0.6"/>
  <rect x="0" y="2" width="1280" height="1" fill="#3a8cff" opacity="0.3"/>

  <!-- Bottom accent + status strip -->
  <rect x="0" y="697" width="1280" height="1" fill="#3a8cff" opacity="0.3"/>
  <rect x="0" y="698" width="1280" height="2" fill="#ff7a1a" opacity="0.6"/>

  <!-- Status line left -->
  <text x="40" y="690" font-family="Courier New, monospace" font-size="11"
        fill="#6a7da0" opacity="0.7">▰ WARLOCK-CC  v0.1.0  ·  CM5 + AIO V2  ·  eMMC</text>
  <!-- Status line right -->
  <text x="1240" y="690" text-anchor="end"
        font-family="Courier New, monospace" font-size="11"
        fill="#6a7da0" opacity="0.7">902-928 MHz · SX1262 · MT7921u · RTL-SDR · PPS</text>

  <!-- Corner brackets (Mil-grade HUD feel) -->
  <g stroke="#ff7a1a" stroke-width="1.5" fill="none" opacity="0.55">
    <!-- top-left -->
    <path d="M 20 30 L 20 20 L 30 20"/>
    <!-- top-right -->
    <path d="M 1260 30 L 1260 20 L 1250 20"/>
    <!-- bottom-left -->
    <path d="M 20 670 L 20 680 L 30 680"/>
    <!-- bottom-right -->
    <path d="M 1260 670 L 1260 680 L 1250 680"/>
  </g>
</svg>
